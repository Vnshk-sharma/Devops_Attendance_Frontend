<!DOCTYPE html>
<html>
<head>
    <title>Attendance App</title>
    <link rel="stylesheet" href="./login_front_design.css">

    
</head>
<body>

<div class="container">
  <h2 id="title">Login</h2>

  <form onsubmit="handleSubmit(event)">

    <div class="input-box">
      <input type="text" required id="name" placeholder="Full Name">
    </div>

    <div class="input-box">
      <input type="text" required id="enrollment" placeholder="Enrollment Number">
    </div>

    <div class="input-box">
      <select id="batch" required>
        <option value="" disabled selected>Select Batch</option>
        <option value="IT1">IT1</option>
        <option value="IT2">IT2</option>
        <option value="AIML">AIML</option>
      </select>
    </div>

    <div id="extraFields" class="hidden">
      <div class="input-box">
        <input type="email" placeholder="Email">
      </div>
    </div>

    <button type="submit" id="submitBtn">Login</button>
  </form>

  <div class="toggle">
    <span id="toggleText">Don't have an account?</span>
    <span onclick="toggleMode()" id="toggleBtn">Sign Up</span>
  </div>
</div>



</body>

<script src="login_front_script.js"></script>
</html>
