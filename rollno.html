<!DOCTYPE html>
<html>
<head>
  <title>Roll Number</title>
</head>
<body>

<h2>Student Details</h2>

<table border="1" cellpadding="10">
  <tr>
    <td><b>Roll Number</b></td>
    <td id="rollNo"></td>
  </tr>
</table>

<script>
  // get roll number from localStorage (saved during login)
  const roll = localStorage.getItem("Enrollment_Number");

  // display it
  document.getElementById("Enrollment_Number").textContent = roll || "Not Found";
</script>

</body>
</html>
