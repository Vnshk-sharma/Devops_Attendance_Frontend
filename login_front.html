<!DOCTYPE html>
<html>
<head>
    <title>Attendance App</title>
    <link rel="stylesheet" href="login_front_design.css">

    
</head>
<body>

<div class="container">

    <!-- LOGIN FORM -->
    <div id="loginForm">
        <h3>Login</h3>
        <input type="text" id="loginEnroll" placeholder="Enrolment Number">
        <input type="password" id="loginPassword" placeholder="Password">
        <button onclick="login()">Login</button>
        <div class="toggle" onclick="showSignup()">Sign Up</div>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupForm" style="display:none;">
        <h3>Sign Up</h3>
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="enrolment" placeholder="Enrolment Number">
        <input type="text" id="branch" placeholder="Branch">
        <input type="email" id="email" placeholder="College Email">
        <input type="text" id="semester" placeholder="Semester">
        <input type="password" id="password" placeholder="Password">
        <button onclick="signup()">Register</button>
        <div class="toggle" onclick="showLogin()">Back to Login</div>
    </div>

</div>

<script src="login_front_script.js"></script>

</body>
</html>
