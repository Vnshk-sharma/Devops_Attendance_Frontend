<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>

<link rel="stylesheet" href="signup.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">
  <h2>Create Account</h2>

  <form onsubmit="signup(event)">

    <!-- Name -->
    <div class="input-box">
      <input type="text" id="Name_of_Student" placeholder="Full Name" required>
    </div>

    <!-- Enrollment -->
    <div class="input-box">
      <input type="text" id="Enrollment_Number" placeholder="Enrollment Number" required>
    </div>

    <!-- Password -->
    <div class="input-box">
      <input type="password" id="Password" placeholder="Password" required>
    </div>

    <!-- Branch -->
    <div class="input-box">
      <select id="Branch" required>
        <option value="" disabled selected>Select Batch</option>
        <option>IT1</option>
        <option>IT2</option>
        <option>AIML</option>
      </select>
    </div>

    <!-- Email -->
    <div class="input-box">
      <input type="email" id="College_Email" placeholder="College Email" required>
    </div>

    <button type="submit">Sign Up</button>

  </form>

  <div class="link">
    Already have an account?
    <span onclick="goToLogin()">Login</span>
  </div>
</div>

<script src="signup.js"></script>

</body>
</html>
